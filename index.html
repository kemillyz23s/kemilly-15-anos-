<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Convite 15 Anos - Kemilly</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
overflow:hidden;
}

#video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:10;
}

#convite{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("file_000000004ffc720eb3e1abbd96e3148b.png") center center/cover no-repeat;
justify-content:center;
align-items:center;
}

.fundoEscuro{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.35);
}

.conteudo{
position:relative;
z-index:2;
display:flex;
flex-direction:column;
gap:15px;
width:90%;
max-width:350px;
}

.botao{
background:#b91c1c;
color:#fff;
padding:16px;
border-radius:14px;
text-decoration:none;
text-align:center;
font-size:20px;
font-weight:bold;
transition:.3s;
}

.botao:hover{
transform:scale(1.03);
background:#d62828;
}

#pix{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
z-index:20;
}

.caixa{
background:white;
padding:25px;
border-radius:20px;
width:90%;
max-width:340px;
text-align:center;
}

.caixa h2{
margin-bottom:15px;
}

.caixa p{
font-size:20px;
margin:20px 0;
word-break:break-all;
}

.caixa button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#b91c1c;
color:white;
font-size:18px;
cursor:pointer;
}

.fechar{
background:#555!important;
}

</style>
</head>

<body>

<video id="video" autoplay playsinline>
<source src="lv_0_20260627153750.mp4" type="video/mp4">
</video>

  <div id="convite">

<div class="fundoEscuro"></div>

<div class="conteudo">

<button class="botao" onclick="abrirPix()">
🎁 Sugestão de Presente
</button>

<a class="botao"
href="https://maps.app.goo.gl/hyxffs5BNKjG2kER6"
target="_blank">
📍 Localização
</a>

<a class="botao"
href="https://wa.me/5547992299587?text=Olá!%20Estou%20confirmando%20minha%20presença%20nos%20seus%2015%20anos."
target="_blank">
💬 Confirmar Presença
</a>

</div>

</div>

<div id="pix">

<div class="caixa">

<h2>🎁 Chave Pix</h2>

<p id="cpf">
115.004.469-12
</p>

<button onclick="copiarPix()">
📋 Copiar Chave Pix
</button>

<button class="fechar" onclick="fecharPix()">
Fechar
</button>

</div>

</div>

<script>

const video = document.getElementById("video");
const convite = document.getElementById("convite");
const pix = document.getElementById("pix");

video.onended = () => {
    video.style.display = "none";
    convite.style.display = "flex";
};

function abrirPix(){
    pix.style.display = "flex";
}

function fecharPix(){
    pix.style.display = "none";
}

function copiarPix(){

const chave = "115.004.469-12";

navigator.clipboard.writeText(chave).then(()=>{
    alert("✅ Chave Pix copiada!");
}).catch(()=>{

const campo = document.createElement("textarea");
campo.value = chave;

document.body.appendChild(campo);

campo.select();

document.execCommand("copy");

document.body.removeChild(campo);

alert("✅ Chave Pix copiada!");

});

}

</script>

</body>
</html>
